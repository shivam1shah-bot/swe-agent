name: Build and Push Multi-Platform Images

on:
  [push]

env:
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  # UI Image - Matrix Build
  build-ui:
    name: Build UI Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.ui
          push: true
          tags: ${{ env.IMAGE_NAME }}:ui-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp

  build-ui-multiarch:
    needs: [build-ui]
    name: Build multiarch UI image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:ui-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:ui-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:ui-${{ github.sha }}-linux-arm64

  # API Image - Matrix Build
  build-api:
    name: Build API Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer,agent-skills"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.api
          push: true
          tags: ${{ env.IMAGE_NAME }}:api-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-api-multiarch:
    needs: [build-api]
    name: Build multiarch API image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:api-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:api-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:api-${{ github.sha }}-linux-arm64

  # Task Execution Worker - Matrix Build
  build-task-execution-worker:
    name: Build Task Execution Worker Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer,agent-skills,devstack-v2"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.worker.task_execution
          push: true
          tags: ${{ env.IMAGE_NAME }}:task-execution-worker-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-task-execution-worker-multiarch:
    needs: [build-task-execution-worker]
    name: Build multiarch task execution worker image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:task-execution-worker-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:task-execution-worker-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:task-execution-worker-${{ github.sha }}-linux-arm64

  # Code Review Worker - Matrix Build
  build-code-review-worker:
    name: Build Code Review Worker Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer,agent-skills"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.worker.code_review
          push: true
          tags: ${{ env.IMAGE_NAME }}:code-review-worker-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-code-review-worker-multiarch:
    needs: [build-code-review-worker]
    name: Build multiarch code review worker image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:code-review-worker-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:code-review-worker-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:code-review-worker-${{ github.sha }}-linux-arm64

  # Comment Analyzer Worker - Matrix Build
  build-comment-analyzer-worker:
    name: Build Comment Analyzer Worker Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.worker.comment_analyzer
          push: true
          tags: ${{ env.IMAGE_NAME }}:comment-analyzer-worker-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-comment-analyzer-worker-multiarch:
    needs: [build-comment-analyzer-worker]
    name: Build multiarch comment analyzer worker image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:comment-analyzer-worker-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:comment-analyzer-worker-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:comment-analyzer-worker-${{ github.sha }}-linux-arm64

  # MCP Server - Matrix Build
  build-mcp:
    name: Build MCP Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer,agent-skills"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.mcp_server
          push: true
          tags: ${{ env.IMAGE_NAME }}:mcp-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-mcp-multiarch:
    needs: [build-mcp]
    name: Build multiarch MCP image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:mcp-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:mcp-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:mcp-${{ github.sha }}-linux-arm64

  # Scheduler Worker - Matrix Build
  build-scheduler-worker:
    name: Build Scheduler Worker Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.WORKFLOWGATEKEEPER_APP_ID }}
          private-key: ${{ secrets.WORKFLOWGATEKEEPER_PRIVATEKEY }}
          owner: razorpay
          repositories: "ai-pr-reviewer"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.worker.scheduler
          push: true
          tags: ${{ env.IMAGE_NAME }}:scheduler-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp
          secrets: |
            github_token=${{ steps.app-token.outputs.token }}

  build-scheduler-worker-multiarch:
    needs: [build-scheduler-worker]
    name: Build multiarch scheduler worker image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:scheduler-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:scheduler-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:scheduler-${{ github.sha }}-linux-arm64

  # Webhook Receiver - Matrix Build
  build-webhook-receiver:
    name: Build Webhook Receiver Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/prod/Dockerfile.webhook_receiver
          push: true
          tags: ${{ env.IMAGE_NAME }}:webhook-receiver-${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_USERNAME=rzp

  build-webhook-receiver-multiarch:
    needs: [build-webhook-receiver]
    name: Build multiarch webhook receiver image
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:webhook-receiver-${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:webhook-receiver-${{ github.sha }}-linux-amd64 \
            ${{ env.IMAGE_NAME }}:webhook-receiver-${{ github.sha }}-linux-arm64

  # Build status check
  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs:
      - build-ui-multiarch
      - build-api-multiarch
      - build-task-execution-worker-multiarch
      - build-code-review-worker-multiarch
      - build-comment-analyzer-worker-multiarch
      - build-mcp-multiarch
      - build-scheduler-worker-multiarch
      - build-webhook-receiver-multiarch
    if: always()
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build-ui-multiarch.result }}" == "success" && \
                "${{ needs.build-api-multiarch.result }}" == "success" && \
                "${{ needs.build-task-execution-worker-multiarch.result }}" == "success" && \
                "${{ needs.build-code-review-worker-multiarch.result }}" == "success" && \
                "${{ needs.build-comment-analyzer-worker-multiarch.result }}" == "success" && \
                "${{ needs.build-mcp-multiarch.result }}" == "success" && \
                "${{ needs.build-scheduler-worker-multiarch.result }}" == "success" && \
                "${{ needs.build-webhook-receiver-multiarch.result }}" == "success" ]]; then
            echo "All multiarch builds successful"
            exit 0
          else
            echo "One or more multiarch builds failed:"
            echo "  UI: ${{ needs.build-ui-multiarch.result }}"
            echo "  API: ${{ needs.build-api-multiarch.result }}"
            echo "  Task Execution Worker: ${{ needs.build-task-execution-worker-multiarch.result }}"
            echo "  Code Review Worker: ${{ needs.build-code-review-worker-multiarch.result }}"
            echo "  Comment Analyzer Worker: ${{ needs.build-comment-analyzer-worker-multiarch.result }}"
            echo "  MCP: ${{ needs.build-mcp-multiarch.result }}"
            echo "  Scheduler Worker: ${{ needs.build-scheduler-worker-multiarch.result }}"
            echo "  Webhook Receiver: ${{ needs.build-webhook-receiver-multiarch.result }}"
            exit 1
          fi
