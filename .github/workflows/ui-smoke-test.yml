name: UI Smoke Test

on:
  pull_request:
    paths:
      - 'ui/**'
      - 'build/docker/prod/Dockerfile.ui'
      - 'build/docker/dev/Dockerfile.ui.dev'
      - 'build/docker/scripts/smoke-test-ui*.sh'

jobs:
  ui-smoke-test:
    name: UI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        working-directory: ui
        run: yarn install --immutable

      - name: Lint
        working-directory: ui
        run: yarn lint

      - name: Type check
        working-directory: ui
        run: yarn tsc --noEmit

      - name: Build UI
        working-directory: ui
        run: yarn build

      - name: Verify dist output
        working-directory: ui
        run: |
          # Ensure the build produced a valid dist/ with index.html
          if [ ! -f dist/index.html ]; then
            echo "dist/index.html missing — build did not produce expected output"
            exit 1
          fi
          echo "dist/index.html exists"
          ls -lh dist/

      - name: Smoke test server.js
        working-directory: ui
        run: |
          # Pick a random free port to avoid conflicts on shared self-hosted runners
          PORT=$(python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()")
          echo "Using port $PORT"

          # Start server, redirect output to log file so we can dump it on failure
          PORT=$PORT node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!

          # Wait for server to be ready (sleep first to give Node time to initialize)
          echo "Waiting for server to bind on port $PORT..."
          READY=0
          for i in $(seq 1 30); do
            sleep 1
            if curl -sf http://localhost:$PORT/api/config > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              READY=1
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "server.js crashed during startup. Logs:"
              cat /tmp/server.log
              exit 1
            fi
          done

          if [ $READY -eq 0 ]; then
            echo "Server did not become ready within 30s. Logs:"
            cat /tmp/server.log
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi

          FAILED=0

          # 0. /health — container orchestration health check (lightweight)
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/health)
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "FAIL: /health returned $HEALTH_STATUS (expected 200)"
            FAILED=1
          else
            echo "PASS: /health returned 200"
          fi

          # 1. /api/config — returns 200 with valid JSON containing required fields
          CONFIG_BODY=$(curl -sf http://localhost:$PORT/api/config)
          if [ $? -ne 0 ]; then
            echo "FAIL: /api/config did not return 200"
            FAILED=1
          else
            echo "PASS: /api/config returned 200"
            # Validate required fields in the JSON response
            for field in APP_ENV API_BASE_URL APP_NAME; do
              if ! echo "$CONFIG_BODY" | grep -q "\"$field\""; then
                echo "FAIL: /api/config response missing field: $field"
                FAILED=1
              else
                echo "PASS: /api/config contains field: $field"
              fi
            done
          fi

          # 2. SPA wildcard — unknown routes must return index.html (200), not 404
          # This catches the path-to-regexp wildcard syntax bug (app.get('*') vs '*splat')
          SPA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/some/deep/spa/route)
          if [ "$SPA_STATUS" != "200" ]; then
            echo "FAIL: SPA wildcard route returned $SPA_STATUS (expected 200) — check Express wildcard syntax"
            FAILED=1
          else
            echo "PASS: SPA wildcard route returned 200"
          fi

          # 3. Static asset serving — dist/index.html must be served correctly
          STATIC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/)
          if [ "$STATIC_STATUS" != "200" ]; then
            echo "FAIL: / returned $STATIC_STATUS (expected 200)"
            FAILED=1
          else
            echo "PASS: / (static index.html) returned 200"
          fi

          # 4. 404 for unknown API routes — should not fall through to SPA for /api/* paths
          API_404_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT/api/nonexistent)
          if [ "$API_404_STATUS" == "200" ]; then
            echo "WARN: /api/nonexistent returned 200 (served SPA) — consider explicit /api/* 404 handling"
          else
            echo "PASS: /api/nonexistent returned $API_404_STATUS (not 200)"
          fi

          # Always dump logs for visibility, then clean up
          echo "--- server.js output ---"
          cat /tmp/server.log

          kill $SERVER_PID 2>/dev/null

          if [ $FAILED -ne 0 ]; then
            exit 1
          fi
        env:
          APP_ENV: dev
          NODE_ENV: production
