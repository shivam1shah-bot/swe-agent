# Development Docker Environment as default Configuration
# Clone this to environments/env.dev_docker.toml and configure your secrets to work with this app locally

[app]
name = "SWE Agent"
host = "0.0.0.0"
api_port = 8002
mcp_port = 8003
debug = true
# Docker internal URLs (for inter-container communication)
api_base_url = "http://swe-agent-api:8002"
ui_base_url = "http://swe-agent-ui:8001"
mcp_base_url = "http://swe-agent-mcp-server:8003"

[database]
host = "db"
port = 3306
user = "swe_agent"
password = "swe_agent_password"
name = "swe_agent"
type = "mysql"
pool_size = 10
pool_recycle = 300
pool_timeout = 10
pool_pre_ping = true
echo = true

[cache.redis]
host = "redis"
port = 6379
timeout = 1
password = ""
db = 0

[queue]
type = "sqs"
default_queue = "default_task_execution"

# Task routing configuration - routes tasks to specific queues based on task_type
[queue.task_routing]
# Stage/Dev: All tasks use single queue (code_review queue not provisioned)
# Prod: Change code_review to "code_review_execution" for separate queue
code_review = "default_task_execution"
autonomous_agent = "default_task_execution"
agents_catalogue_execution = "default_task_execution"
github_token_refresh = "default_task_execution"
comment_analysis = "default_task_execution"

# Default queue for general task execution
[queue.sqs.queues.default_task_execution]
name = "dev-swe-agent-tasks"
visibility_timeout = 10800  # 3 hours
message_retention_period = 1209600
wait_time_seconds = 20
max_messages = 5

# Code review queue - dedicated queue for code review tasks
# Uncomment when switching to dual queue mode (also change queue.task_routing.code_review)
# [queue.sqs.queues.code_review_execution]
# name = "dev-swe-agent-code-reviews"
# visibility_timeout = 14400  # 4 hours for reviews
# message_retention_period = 1209600
# wait_time_seconds = 20
# max_messages = 1

[elasticsearch]
host = "elasticsearch"
port = 9200
index = "faq_search_vector_db"

[discover]
# Discover backend service URL (for discover-ui API proxy)
backend_url = "http://discover-backend:8080"
timeout = 30
# Note: Service-to-service auth uses Basic Auth with discover_service account
# from [auth.users] section. No additional configuration needed here.

[worker]
name = "swe-agent-task-execution-worker"
max_retries = 2
retry_delay = 3
log_level = "DEBUG"
max_messages = 1
wait_time_seconds = 20
visibility_timeout = 300

# Worker profiles - defines accepted task types for each worker type
[worker.profiles.task_execution]
accepted_task_types = ["autonomous_agent", "agents_catalogue_execution", "github_token_refresh"]

[worker.profiles.code_review]
accepted_task_types = ["code_review"]

[worker.profiles.comment_analyzer]
accepted_task_types = ["comment_analysis"]

[aws]
access_key_id = "test"
secret_access_key = "test"
session_token = ""
region = "ap-south-1"
endpoint_url = ""

# Service-specific AWS configurations
[aws.services.claude]
access_key_id = ""
secret_access_key = ""
session_token = ""
region = "us-east-1"  # Bedrock might need specific region

# Webhook Receiver configuration
[webhooks]
port = 8004
enabled_sources = ["devrev"]

[webhooks.devrev]
webhook_secret = ""                    # From DevRev /webhooks.create response
api_base_url = "https://api.devrev.ai"
api_version = "2022-10-20"
pat = ""                               # System User Token for API callbacks
max_timestamp_age_seconds = 60         # Reject events older than this (replay protection)
deduplication_ttl_seconds = 86400      # Redis dedup key TTL (24 hours)

[gcp]
project_id = "sw-agent-464113"
region = "us-east5"
credentials_json = ""  # Populated from environment variable
service_account_email = ""
google_docs_credentials_json = ""  # OAuth token JSON for Google Docs readonly access (credstash key: GCP__GOOGLE_DOCS_CREDENTIALS_JSON)

[agents.claude_code]
provider = "vertex_ai"  # Options: "bedrock", "vertex_ai"
region = "us-east5"  # Must match GCP region for Vertex AI

[google_adk]
enabled = true
model = "gemini-2.5-flash"
use_vertex_ai = true
project_id = "sw-agent-464113"
location = "us-east5"
max_turns = 500
timeout_seconds = 300
default_agent_type = "assistant"

# LLM-based prompt injection validation
[llm_validation]
enabled = true                    # Enable LLM-based prompt validation (second layer)
timeout = 20                      # Timeout for LLM validation call in seconds (fail-closed on timeout)
max_tokens = 100                  # Max tokens for validation response

[github]
api_url = "https://api.github.com"
default_org = "razorpay"
token = ""

# GitHub App configuration
[github.rzp_swe_agent_app]
app_id = ""
private_key = ""
installation_id = ""

# Code Review Bot configuration
[github.rzp_code_review]
app_id = ""
private_key = ""
installation_id = ""

# GitHub CLI configuration
[github.cli]
enabled = true
timeout = 300

[rate_limit]
enabled = true
requests_per_window = 10   # max requests per user per window
window_seconds = 60         # rolling window duration in seconds

[auth]
enabled = true

[auth.users]
dashboard = "dashboard123"
admin = "admin123"
mcp_read_user = "mcp123"
splitz = "splitz123"
devops = "devops123"
discover_service = "discover123"

[logging]
level = "INFO"

[telemetry]
enabled = true
exporter = "prometheus"
metrics_path = "/metrics"
metrics_port = 8080  # Port for separate metrics HTTP server (for Prometheus scraping)
service_name = "swe-agent"
service_version = "1.0.0"

# Telemetry labels (added as resource attributes)
[telemetry.labels]
# environment = "dev"  # Will be set from environment.name
# service = "api"       # Can be overridden per service

# Prometheus-specific configuration
[telemetry.prometheus]
# Future Prometheus-specific options can go here

# OpenTelemetry - sends Claude Code telemetry (metrics + events) to OTEL Collector
[telemetry.otel]
enabled = false
endpoint = "http://localhost:4317"
metrics_enabled = false  # Claude Code native metrics -> OTEL Collector -> vminsert
logs_enabled = false     # SWE Agent task lifecycle events -> OTEL Collector -> ClickHouse
log_user_prompts = true
log_tool_details = true

[environment]
name = "dev_docker"
debug = false
root_dir = ""
upload_folder = ""
max_content_length = 104857600

# Google API for Drive/Docs integration (PRD parsing, document access)
[google_api]
client_id = ""
client_secret = ""
redirect_uris = [
    "http://localhost:28001/google-auth-callback",
    "https://swe-agent.concierge.stage.razorpay.in/google-auth-callback"
]
token_uri = "https://oauth2.googleapis.com/token"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]

# Google OAuth for Application Login (separate from Drive integration)
[google_oauth]
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:28002/api/v1/auth/google_oauth/callback"
token_uri = "https://oauth2.googleapis.com/token"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
scopes = ["openid", "https://www.googleapis.com/auth/userinfo.email"]
jwt_secret = ""

# PR Severity Assessment configuration
[severity_assessment]
enabled = true

# Review mode controls what GitHub review events the bot can post.
# "full"         = bot can APPROVE, REQUEST_CHANGES, or COMMENT based on severity
# "comment_only" = bot always posts COMMENT regardless of severity or skill verdict
# Use "comment_only" for initial rollout to new repos or as a kill-switch.
review_mode = "full"

# Actions to take for each severity level (only effective when review_mode = "full")
# Options: "comment", "approve", "request_changes", "none"
[severity_assessment.actions]
low = "approve"
medium = "comment"
high = "comment"

# Platform safety net: suggestions with importance >= this override auto-approve.
# Set to 0 to disable skill-driven auto-approve entirely (all suggestions block).
# Set to 11 to fully trust repo skills (nothing overrides).
# Default: 8 (only CRITICAL suggestions override the skill's verdict)
approve_block_threshold = 8

# Skill auto-generation feature gate
# When enabled, missing repo-specific skills (e.g. risk-assessment) are generated on-the-fly via LLM.
# Set to false to disable auto-generation and use only pre-existing skills.
[skill_auto_generation]
enabled = false

# rCoRe v2++ feature gate
# Controls incremental rollout of advanced review features (skill-driven auto-approve, etc.)
[rcore_v2_plus]
enabled = true
enabled_repos = ["razorpay/partnerships", "razorpay/agent-skills", "razorpay/alert-rules"]  # e.g. ["razorpay/api", "razorpay/checkout"]
# DevRev integration
[devrev]
api_token = ""   # DevRev Personal Access Token — required for /swe-agent ticket: command

# Akto API token
[akto]
api_token = ""

# Slack integration
# On stage/prod: set via env vars SLACK__BOT_TOKEN, SLACK__SIGNING_SECRET, SLACK__ENABLED=true
# On local dev: fill values in env.dev_docker.toml and set app_token for Socket Mode
[slack]
app_id = ""
client_id = ""
client_secret = ""
signing_secret = ""
verification_token = ""
enabled = true
bot_token = ""
app_token = ""
user_token = ""       # xoxp-... User OAuth Token for users:read.email scope
# Comma-separated default skills when none are specified in the /swe-agent ticket command
default_skills = ""
