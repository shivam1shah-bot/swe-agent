# Staging Environment Configuration

[app]
name = "SWE Agent"
host = "0.0.0.0"
api_port = 8002
debug = false
# API URLs for staging environment
api_base_url = "https://vyom-api.concierge.stage.razorpay.in"
ui_base_url = "https://vyom.concierge.stage.razorpay.in"
additional_cors_origins = [
    "https://krya.concierge.stage.razorpay.in",
    "https://swe-agent.concierge.stage.razorpay.in",
    "https://vyom.concierge.stage.razorpay.in",
]
allowed_redirect_hosts = [
    "krya.concierge.stage.razorpay.in",
    "swe-agent.concierge.stage.razorpay.in",
    "vyom.concierge.stage.razorpay.in",
]

[database]
host = "localhost"
port = 3306
user = "swe_agent_stage_user_rw"
password = "password"
name = "stage_swe_agent"
type = "mysql"
pool_size = 20
pool_recycle = 300
pool_timeout = 10
pool_pre_ping = true
echo = false

[cache.redis]
host = "np-common-redis.np.razorpay.vpc"
port = 6379
timeout = 5
password = ""
db = 0

[queue]
type = "sqs"
default_queue = "default_task_execution"

# Task routing configuration - routes tasks to specific queues based on task_type
[queue.task_routing]
# Stage: All tasks use single queue (code_review queue not provisioned)
# Prod: Change code_review to "code_review_execution" for separate queue
code_review = "default_task_execution"
autonomous_agent = "default_task_execution"
agents_catalogue_execution = "default_task_execution"
github_token_refresh = "default_task_execution"
comment_analysis = "default_task_execution"

# Single default queue for all tasks
[queue.sqs.queues.default_task_execution]
name = "stage-swe-agent-tasks"
visibility_timeout = 10800  # 3 hours
message_retention_period = 1209600
wait_time_seconds = 20
max_messages = 3

# Code review queue - dedicated queue for code review tasks
# Uncomment when switching to dual queue mode (also change queue.task_routing.code_review)
# [queue.sqs.queues.code_review_execution]
# name = "stage-swe-agent-code-reviews"
# visibility_timeout = 14400  # 4 hours for reviews
# message_retention_period = 1209600  # 14 days
# wait_time_seconds = 20
# max_messages = 1

[elasticsearch]
host = ""
port = 80
index = "faq_search_vector_db"
timeout = 30

[worker]
name = "swe-agent-task-execution-worker"
max_retries = 4
retry_delay = 7
log_level = "INFO"
max_messages = 3
wait_time_seconds = 20
visibility_timeout = 600

# Worker profiles - defines accepted task types for each worker type
[worker.profiles.task_execution]
accepted_task_types = ["autonomous_agent", "agents_catalogue_execution", "github_token_refresh"]

[worker.profiles.code_review]
accepted_task_types = ["code_review"]

[worker.profiles.comment_analyzer]
accepted_task_types = ["comment_analysis"]

[aws]
access_key_id = ""
secret_access_key = ""
session_token = ""
region = "ap-south-1"
endpoint_url = ""

# Service-specific AWS configurations
[aws.services.claude]
access_key_id = ""
secret_access_key = ""
session_token = ""
region = "us-east-1"  # Bedrock might need specific region

[gcp]
project_id = "sw-agent-464113"
region = "us-east5"
credentials_json = ""  # Populated from environment variable
service_account_email = ""
google_docs_credentials_json = ""  # OAuth token JSON for Google Docs readonly access (credstash key: GCP__GOOGLE_DOCS_CREDENTIALS_JSON)

[google_adk]
enabled = true
model = "gemini-2.5-flash"
use_vertex_ai = true
project_id = "sw-agent-464113"
location = "us-east5"
max_turns = 500
timeout_seconds = 300
default_agent_type = "assistant"

[agents.claude_code]
provider = "vertex_ai"
region = "us-east5"

# LLM-based prompt injection validation
[llm_validation]
enabled = true                    # Enable LLM-based prompt validation (second layer)
timeout = 20                      # Timeout for LLM validation call in seconds (fail-closed on timeout)
max_tokens = 100                  # Max tokens for validation response

[github]
api_url = "https://api.github.com"
default_org = "razorpay"
token = ""

# GitHub App configuration
[github.rzp_swe_agent_app]
app_id = ""
private_key = ""
installation_id = ""

# GitHub Code Review Bot configuration
[github.rzp_code_review]
app_id = ""
private_key = ""
installation_id = ""

# GitHub CLI configuration
[github.cli]
enabled = true
timeout = 300

[rate_limit]
enabled = true
requests_per_window = 10   # max requests per user per window
window_seconds = 60         # rolling window duration in seconds

[auth]
enabled = true

[auth.users]
dashboard = ""
admin = ""
mcp_read_user = ""
devops = ""
discover_service = ""

[telemetry]
enabled = true
exporter = "prometheus"
metrics_path = "/metrics"
metrics_port = 8080
service_name = "swe-agent"
service_version = "1.0.0"

[telemetry.otel]
enabled = true
endpoint = "http://otel-collector.swe-agent.svc.cluster.local:4317"
metrics_enabled = true   # Claude Code native metrics -> OTEL Collector -> vminsert
logs_enabled = false     # Disabled until ClickHouse-DE datastore is confirmed
log_user_prompts = true
log_tool_details = true

[logging]
level = "INFO"

[environment]
name = "stage"
debug = false
root_dir = ""
upload_folder = ""
max_content_length = 104857600

# Google API for Drive/Docs integration (PRD parsing, document access)
[google_api]
client_id = ""
client_secret = ""
redirect_uris = [
    "https://vyom.concierge.stage.razorpay.in/google-auth-callback",
    "https://swe-agent.concierge.stage.razorpay.in/google-auth-callback",
    "http://localhost:28001/google-auth-callback"
]
token_uri = "https://oauth2.googleapis.com/token"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]

# Google OAuth for Application Login (separate from Drive integration)
[google_oauth]
client_id = ""
client_secret = ""
redirect_uri = "https://vyom-api.concierge.stage.razorpay.in/api/v1/auth/google_oauth/callback"
token_uri = "https://oauth2.googleapis.com/token"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
scopes = ["openid", "https://www.googleapis.com/auth/userinfo.email"]
jwt_secret = ""

# Akto API token
[akto]
api_token = ""

# Discover backend service configuration
[discover]
# Discover backend service URL (for discover-ui API proxy)
backend_url = "https://discover-api.concierge.stage.razorpay.in"
timeout = 30
# Note: Service-to-service auth uses Basic Auth with discover_service account
# from [auth.users] section. Configure password via AUTH__USERS__DISCOVER_SERVICE env var.
